<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro - Usuario</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="container">

        <div class="logo">
            <h1 style="color: green;">Calculadora<span>Pessoal</span></h1>
            <p>Crie sua conta</p>
        </div>

        <h2>Cadastro</h2>

        <form>
            <div class="input-group">
                <label>Nome</label>
                <input type="text" placeholder="Digite seu nome" required>
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" placeholder="Digite seu email" required>
            </div>

            <div class="input-group">
                <label>Senha</label>
                <input type="password" placeholder="Crie uma senha" required>
            </div>

            <div class="input-group">
                <label>Confirmar Senha</label>
                <input type="password" placeholder="Confirme sua senha" required>
            </div>

            <button type="submit">Cadastrar</button>

            <p class="link">
                Já tenho Uma conta! <a href="login.html">Fazer login</a>
            </p>
        </form>

        <div class="footer">
            © 2026 Calculadora
            <h4>Estamos Prontos Para ajudar Voce a Organizar a Tua Vida Financeira!</h4>
        </div>

    </div>

        <a href="sobre.html">Sobre Nós</a>     |
        <a href="Politicas.html">Politicas e Privacidades</a>   |
        <a href="contactos.html">Contactos</a>     |
        <a href="Missão.html">Missão</a> |
        <a href="Equipe.html">Nossa Equipe</a>
        </footer>
</body>
</html>
