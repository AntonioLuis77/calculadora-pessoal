<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Calculadora Orçamental Pessoal</title>
   <link rel="stylesheet" href="Tela.css">
</head>
<body>

<div class="container">
    <h1>Calculadora Orçamental Pessoal</h1>

    <div class="saldo">
        Saldo Atual: <span id="saldo">0.00</span> Kz
    </div>

    <h3>Registrar Receita ou Despesa</h3>

    <input type="text" id="descricao" placeholder="Descrição">

    <input type="number" id="valor" placeholder="Valor">

    <select id="tipo">
        <option value="receita">Receita</option>
        <option value="despesa">Despesa</option>
    </select>

    <select id="categoria">
        <option>Salário</option>
        <option>Alimentação</option>
        <option>Transporte</option>
      <option>Eletrecidade</option>
        <option>Outros</option>
    </select>

    <button onclick="adicionarTransacao()">Registrar</button>

    <h3>Adicionar Nova Categoria</h3>
    <input type="text" id="novaCategoria" placeholder="Nome da nova categoria">
    <button onclick="adicionarCategoria()">Adicionar Categoria</button>

    <h3>Histórico</h3>
    <table>
        <thead>
            <tr>
                <th>Descrição</th>
                <th>Categoria</th>
                <th>Tipo</th>
                <th>Valor (Kz)</th>
            </tr>
        </thead>
        <tbody id="listaTransacoes"></tbody>
    </table>
</div>
 
    <br>
    <footer>
         <a href="sobre.html">Sobre Nós</a> |
        <a href="Politicas.html">Politicas e Privacidades</a> |
        <a href="contactos.html">Contactos</a> |
        <a href="Missão.html">Missão</a> |
        <a href="Equipe.html">Nossa Equipe</a>
    </footer>

<script src="FuntionTela.js"></script>
           
</body>
</html>
