<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TelaInicial-Calculadora</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
     

    <header>
        <a href="login.html" class="btn-top">Fazer Login</a>
        <a href="cadastro.html" class="btn-top">Cadastrar</a>
    </header>

    <main>
        <div class="calculator">
            <input type="text" class="display" placeholder="0" disabled>
            <div class="buttons">
                <button class="op">C</button> <button class="op">/</button> <button class="op">*</button> <button class="op">⌫</button>
                <button>7</button> <button>8</button> <button>9</button> <button class="op">-</button>
                <button>4</button> <button>5</button> <button>6</button> <button class="op">+</button>
                <button>1</button> <button>2</button> <button>3</button> <button class="equal">=</button>
                <button style="grid-column: span 2;">0</button> <button>.</button>
            </div>
        </div>
    </main>
    
    <footer>
          <a href="sobre.html">Sobre Nós</a> |
        <a href="Politicas.html">Politicas e Privacidades</a> |
        <a href="contactos.html">Contactos</a> |
        <a href="Missão.html">Missão</a> |
        <a href="Equipe.html">Nossa Equipe</a>
        </footer>

        <script src="Cálculo.Js"></script>
</body>

</html>
